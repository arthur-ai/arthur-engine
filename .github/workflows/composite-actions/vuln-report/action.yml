name: "Vulnerability scan & justification report"
description: >
  Advisory container vulnerability scan (Docker Scout + Trivy) for a single image. Uploads SARIF
  to the GitHub Security tab and generates an SBOM + a VEX-applied HIGH/CRITICAL justification
  report, uploaded as a workflow artifact. Never fails the build (advisory). Requires the caller
  to have already `docker login`'d and to have checked out the repo (for security/vex + renderer).
  The caller job needs `permissions: { security-events: write }`.

inputs:
  image:
    description: "Fully-qualified image ref to scan, e.g. arthurplatform/genai-engine-cpu:1.2.3"
    required: true
  slug:
    description: "Short unique label for this image, e.g. genai-cpu (used for SARIF category & artifact name)"
    required: true
  platform:
    description: "Platform to scan for multi-arch images"
    required: false
    default: "linux/amd64"

runs:
  using: composite
  steps:
    # --- Docker Scout: CVEs -> SARIF (advisory) ---
    - name: Docker Scout CVE scan (advisory)
      uses: docker/scout-action@v1
      continue-on-error: true
      with:
        command: cves
        image: ${{ inputs.image }}
        platform: ${{ inputs.platform }}
        only-severities: critical,high
        sarif-file: scout-${{ inputs.slug }}.sarif
    - name: Upload Scout SARIF
      if: always() && hashFiles(format('scout-{0}.sarif', inputs.slug)) != ''
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: scout-${{ inputs.slug }}.sarif
        category: scout-${{ inputs.slug }}
    # --- Docker Scout: base-image upgrade recommendations (advisory, logs only) ---
    - name: Docker Scout recommendations (advisory)
      uses: docker/scout-action@v1
      continue-on-error: true
      with:
        command: recommendations
        image: ${{ inputs.image }}
        platform: ${{ inputs.platform }}

    # --- Install Trivy CLI (official action; always latest) ---
    # Unpinned: GitHub only retains release assets for recent versions, so pinned tags eventually 404.
    - name: Install Trivy
      uses: aquasecurity/setup-trivy@v0.3.1
      with:
        version: latest
        token: ${{ github.token }}

    # --- Trivy: single scan -> JSON, then convert to SARIF (advisory) ---
    - name: Trivy scan (advisory)
      shell: bash
      env:
        TRIVY_PLATFORM: ${{ inputs.platform }}
      run: |
        set -euo pipefail
        trivy image \
          --severity HIGH,CRITICAL \
          --vex security/vex/openvex.json \
          --show-suppressed \
          --scanners vuln \
          --format json \
          --output "report-${{ inputs.slug }}.json" \
          "${{ inputs.image }}"
        trivy convert \
          --format sarif \
          --output "trivy-${{ inputs.slug }}.sarif" \
          "report-${{ inputs.slug }}.json"
    - name: Upload Trivy SARIF
      if: always() && hashFiles(format('trivy-{0}.sarif', inputs.slug)) != ''
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-${{ inputs.slug }}.sarif
        category: trivy-${{ inputs.slug }}

    # --- SBOM (CycloneDX) ---
    - name: Generate SBOM (CycloneDX)
      shell: bash
      run: |
        set -euo pipefail
        trivy image \
          --format cyclonedx \
          --output "sbom-${{ inputs.slug }}.cdx.json" \
          "${{ inputs.image }}"

    # --- Human-readable justification report ---
    - name: Render justification report
      shell: bash
      run: |
        set -euo pipefail
        python3 security/render_report.py \
          "report-${{ inputs.slug }}.json" \
          "report-${{ inputs.slug }}.md" \
          "${{ inputs.image }}"

    - name: Upload vulnerability docs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: vuln-docs-${{ inputs.slug }}
        path: |
          sbom-${{ inputs.slug }}.cdx.json
          report-${{ inputs.slug }}.json
          report-${{ inputs.slug }}.md
        if-no-files-found: warn
