name: Version Management

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      intent:
        description: 'Trigger version bump'
        required: true
        default: 'bump_version'
        type: string

jobs:
  bump-version-dev:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/composite-actions/setup-git
        with:
          safe-directory: ${{ runner.workspace }}
      - uses: ./.github/workflows/composite-actions/setup-poetry
        with:
          working-directory: genai-engine
      - uses: ./.github/workflows/composite-actions/setup-poetry
        with:
          working-directory: ml-engine
      - name: Bump version
        shell: bash
        run: |
          pip install bump2version
          bump2version patch --tag --tag-name "{new_version}-dev"
          git push origin dev
          git push origin $(cat version)-dev

  bump-version-main:
    if: github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, 'Increment arthur-engine version to')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/composite-actions/setup-git
        with:
          safe-directory: ${{ runner.workspace }}
      - uses: ./.github/workflows/composite-actions/setup-poetry
        with:
          working-directory: genai-engine
      - uses: ./.github/workflows/composite-actions/setup-poetry
        with:
          working-directory: ml-engine
      - name: Bump version
        shell: bash
        run: |
          pip install bump2version
          CURRENT_VERSION=$(cat version)
          git tag $CURRENT_VERSION -m "Increment arthur-engine version to $CURRENT_VERSION"
          git push origin $CURRENT_VERSION
