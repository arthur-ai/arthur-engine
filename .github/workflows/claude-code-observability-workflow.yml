name: Claude Code Observability CI

on:
  pull_request:
    paths:
      - 'integrations/claude-code-observability/**'
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: python3 -m pytest integrations/claude-code-observability/test_tracer.py -v
