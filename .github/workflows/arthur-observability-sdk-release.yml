name: Arthur Observability SDK - Release

# Two independent trigger paths share the same client-generation job:
#
# Path A — Dev pre-release (any push to `dev` touching arthur-observability-sdk/):
#   generate-client → build-dev-wheel → publish-test-pypi
#   Version: {base}.dev0, published to test.pypi.org.
#   The version override is in-workspace only — never committed.
#
# Path B — Stable release (push to `main` with an "Increment arthur-engine version to …" commit):
#   generate-client → build-stable-wheel → publish-pypi → create-git-tag
#   Version: whatever pyproject.toml says (set by version-workflow.yml).
#   Published to pypi.org; git tag sdk-v{VERSION} is created after publish.
#
# Consumers of dev builds:
#   pip install --extra-index-url https://test.pypi.org/simple/ --pre arthur-observability-sdk
on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'arthur-observability-sdk/**'

jobs:
  # ── shared: generate the OpenAPI client artifact ──────────────────────────
  generate-client:
    if: |
      github.ref == 'refs/heads/dev' ||
      (github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'Increment arthur-engine version to'))
    runs-on: ubuntu-latest
    env:
      GIT_DEPTH: 100
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: ${{ env.GIT_DEPTH }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate API client
        working-directory: arthur-observability-sdk
        run: ./scripts/generate_openapi_client.sh generate python

      - uses: actions/upload-artifact@v4
        with:
          name: arthur-genai-client
          path: arthur-observability-sdk/src/arthur_genai_client

  # ── Path A: dev pre-release ────────────────────────────────────────────────
  build-dev-wheel:
    needs: generate-client
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    container: python:3.12-bullseye
    env:
      GIT_DEPTH: 100
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: ${{ env.GIT_DEPTH }}

      - uses: ./.github/workflows/composite-actions/setup-git
        with:
          safe-directory: ${{ runner.workspace }}

      - uses: actions/download-artifact@v4
        with:
          name: arthur-genai-client
          path: arthur-observability-sdk/src/arthur_genai_client

      - uses: ./.github/workflows/composite-actions/setup-poetry
        with:
          working-directory: arthur-observability-sdk

      - name: Compute dev version and build wheel
        run: |
          BASE_VERSION=$(poetry -C arthur-observability-sdk version --short)
          DEV_VERSION="${BASE_VERSION}.dev0"
          echo "Building dev version: ${DEV_VERSION}"
          # Override version in workspace only — not committed.
          poetry -C arthur-observability-sdk version "${DEV_VERSION}"
          ./arthur-observability-sdk/scripts/build_sdk_wheel.sh

      - uses: actions/upload-artifact@v4
        with:
          name: sdk-dev-wheel
          path: arthur-observability-sdk/dist/*.whl

  publish-test-pypi:
    needs: build-dev-wheel
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: shared-protected-branch-secrets
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdk-dev-wheel
          path: dist/

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ── Path B: stable release ─────────────────────────────────────────────────
  build-stable-wheel:
    needs: generate-client
    if: github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'Increment arthur-engine version to')
    runs-on: ubuntu-latest
    container: python:3.12-bullseye
    env:
      GIT_DEPTH: 100
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: ${{ env.GIT_DEPTH }}

      - uses: ./.github/workflows/composite-actions/setup-git
        with:
          safe-directory: ${{ runner.workspace }}

      - uses: actions/download-artifact@v4
        with:
          name: arthur-genai-client
          path: arthur-observability-sdk/src/arthur_genai_client

      - uses: ./.github/workflows/composite-actions/setup-poetry
        with:
          working-directory: arthur-observability-sdk

      - name: Build stable wheel
        run: ./arthur-observability-sdk/scripts/build_sdk_wheel.sh

      - uses: actions/upload-artifact@v4
        with:
          name: sdk-stable-wheel
          path: arthur-observability-sdk/dist/*.whl

  publish-pypi:
    needs: build-stable-wheel
    if: github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'Increment arthur-engine version to')
    runs-on: ubuntu-latest
    environment: shared-protected-branch-secrets
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdk-stable-wheel
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  create-git-tag:
    needs: publish-pypi
    if: github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'Increment arthur-engine version to')
    runs-on: ubuntu-latest
    environment: shared-protected-branch-secrets
    steps:
      - name: Generate Arthur GitHub Automator App Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ARTHUR_GH_AUTOMATOR_APP_ID }}
          private-key: ${{ secrets.ARTHUR_GH_AUTOMATOR_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - name: Install Poetry
        run: pip install poetry

      - name: Create and push git tag
        run: |
          VERSION=$(poetry -C arthur-observability-sdk version --short)
          TAG="sdk-v${VERSION}"
          echo "Creating tag: ${TAG}"
          git tag "${TAG}"
          git push origin "${TAG}"
