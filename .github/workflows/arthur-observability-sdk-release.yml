name: Arthur Observability SDK - Release

# Both branches publish to pypi.org via the same pipeline:
#
# Dev pre-release (push to `dev` touching arthur-observability-sdk/):
#   generate-client → build-wheel (.dev0 suffix) → publish-pypi
#   Install: pip install --pre arthur-observability-sdk
#
# Stable release (push to `main` with "Increment arthur-engine version to …" commit):
#   generate-client → build-wheel → publish-pypi → create-git-tag
#   Install: pip install arthur-observability-sdk
on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'arthur-observability-sdk/**'

jobs:
  # ── shared: generate the OpenAPI client artifact ──────────────────────────
  generate-client:
    if: |
      (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main') &&
      startsWith(github.event.head_commit.message, 'Increment arthur-engine version to')
    runs-on: ubuntu-latest
    env:
      GIT_DEPTH: 100
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: ${{ env.GIT_DEPTH }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate API client
        working-directory: arthur-observability-sdk
        run: ./scripts/generate_openapi_client.sh generate python

      - uses: actions/upload-artifact@v4
        with:
          name: arthur-genai-client
          path: arthur-observability-sdk/python/src/arthur_genai_client

  # ── build wheel ───────────────────────────────────────────────────────────
  build-wheel:
    needs: generate-client
    runs-on: ubuntu-latest
    container: python:3.12-bullseye
    env:
      GIT_DEPTH: 100
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: ${{ env.GIT_DEPTH }}

      - uses: ./.github/workflows/composite-actions/setup-git
        with:
          safe-directory: ${{ runner.workspace }}

      - uses: actions/download-artifact@v4
        with:
          name: arthur-genai-client
          path: arthur-observability-sdk/python/src/arthur_genai_client

      - uses: ./.github/workflows/composite-actions/setup-uv
        with:
          working-directory: arthur-observability-sdk/python

      - name: Compute version and build wheel
        run: |
          BASE_VERSION=$(python3 -c "import tomllib; d=tomllib.load(open('arthur-observability-sdk/python/pyproject.toml','rb')); print(d['project']['version'])")
          if [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            export DEV_VERSION="${BASE_VERSION}.dev0"
            echo "Building dev version: ${DEV_VERSION}"
            export DEV_VERSION="${BASE_VERSION}.dev0"
            sed -i "s/^version = .*/version = \"${DEV_VERSION}\"/" arthur-observability-sdk/python/pyproject.toml
          else
            echo "Building stable version: ${BASE_VERSION}"
          fi
          ./arthur-observability-sdk/scripts/build_sdk_wheel.sh

      - uses: actions/upload-artifact@v4
        with:
          name: sdk-wheel
          path: arthur-observability-sdk/dist/*.whl

  # ── publish to PyPI ───────────────────────────────────────────────────────
  publish-pypi:
    needs: build-wheel
    runs-on: ubuntu-latest
    environment:
      name: shared-protected-branch-secrets
      url: https://pypi.org/project/arthur-observability-sdk/
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdk-wheel
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  # ── create git tag (stable releases only) ─────────────────────────────────
  create-git-tag:
    needs: publish-pypi
    if: github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'Increment arthur-engine version to')
    runs-on: ubuntu-latest
    environment: shared-protected-branch-secrets
    steps:
      - name: Generate Arthur GitHub Automator App Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ARTHUR_GH_AUTOMATOR_APP_ID }}
          private-key: ${{ secrets.ARTHUR_GH_AUTOMATOR_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create and push git tag
        run: |
          VERSION=$(python3 -c "import tomllib; d=tomllib.load(open('arthur-observability-sdk/python/pyproject.toml','rb')); print(d['project']['version'])")
          TAG="sdk-v${VERSION}"
          echo "Creating tag: ${TAG}"
          git tag "${TAG}"
          git push origin "${TAG}"
