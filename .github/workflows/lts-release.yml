name: Arthur Engine — LTS Release

# LTS publish pipeline. Independent from `arthur-engine-workflow.yml`
# (the continuous build/publish) and `version-workflow.yml` (the
# continuous version bump).
#
# Strategy:
#   * Docker images: RETAG the source-version images (no rebuild).
#     Source version is read from `.lts-source-version` written by the
#     lts-management orchestrator at the LTS branch root.
#   * Helm charts: REPACKAGE (Chart.yaml has been updated to LTS by the
#     orchestrator). Push to ghcr.io + Docker Hub OCI.
#   * Observability SDK: BUILD wheel from the LTS pyproject (`.post`
#     form) and publish to PyPI. PyPI is immutable so retag isn't an
#     option.
#
# Trigger: tag matching `*-lts` or `*-lts-patch-*` (simple human-readable
# globs). No commit-message gates, no branch gates. The continuous
# workflows above ARE NOT modified — they don't fire on `lts/*` branches
# or on these tags because their existing triggers don't match.

on:
  push:
    tags:
      - '*-lts'
      - '*-lts-patch-*'

jobs:
  # ── 1. Retag Docker images (genai-engine-cpu, genai-engine-gpu, ml-engine)
  retag-docker-images:
    name: Retag engine Docker images
    runs-on: ubuntu-latest
    environment: shared-protected-branch-secrets
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - name: Read source version
        id: src
        run: |
          if [ ! -f .lts-source-version ]; then
            echo "ERROR: .lts-source-version not found at repo root." >&2
            echo "       The lts-management orchestrator must write this" >&2
            echo "       file when creating the LTS branch." >&2
            exit 1
          fi
          SRC=$(tr -d '[:space:]' < .lts-source-version)
          echo "source=$SRC" >> "$GITHUB_OUTPUT"
          echo "Source version: $SRC"
          echo "LTS tag:        ${{ github.ref_name }}"
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      - name: Retag genai-engine + ml-engine on Docker Hub
        env:
          SRC: ${{ steps.src.outputs.source }}
          LTS: ${{ github.ref_name }}
        run: |
          set -e
          for IMG in genai-engine-cpu genai-engine-gpu ml-engine; do
            echo "==== arthurplatform/${IMG}: ${SRC} -> ${LTS} ===="
            docker pull "arthurplatform/${IMG}:${SRC}"
            docker tag  "arthurplatform/${IMG}:${SRC}" "arthurplatform/${IMG}:${LTS}"
            docker push "arthurplatform/${IMG}:${LTS}"
          done
      - name: Log in to Nexus
        run: |
          echo "${{ secrets.NEXUS_REPOSITORY_PASSWORD }}" | docker login docker.arthur.ai \
            -u "${{ secrets.NEXUS_REPOSITORY_USERNAME }}" --password-stdin
      - name: Mirror ml-engine to Nexus
        env:
          SRC: ${{ steps.src.outputs.source }}
          LTS: ${{ github.ref_name }}
        run: |
          docker tag  "arthurplatform/ml-engine:${SRC}" "docker.arthur.ai/arthur/scope/ml-engine:${LTS}"
          docker push "docker.arthur.ai/arthur/scope/ml-engine:${LTS}"

  # ── 2. Package + push Helm charts (genai-engine, ml-engine) ─────────────
  publish-helm-charts:
    name: Publish helm charts
    runs-on: ubuntu-latest
    environment: shared-protected-branch-secrets
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: ./.github/workflows/composite-actions/setup-helm
      - name: Verify Chart.yaml versions match the LTS tag
        env:
          LTS: ${{ github.ref_name }}
        run: |
          set -e
          for CHART in deployment/helm/genai-engine/Chart.yaml deployment/helm/ml-engine/Chart.yaml; do
            CHART_VER=$(awk '/^version:/ {print $2; exit}' "$CHART")
            if [ "$CHART_VER" != "$LTS" ]; then
              echo "ERROR: $CHART has version=$CHART_VER, expected $LTS." >&2
              echo "       The lts-management orchestrator must bump Chart.yaml" >&2
              echo "       to the LTS form before pushing the tag." >&2
              exit 1
            fi
          done
      - name: Bump version refs in values.yaml.template (template docs only)
        env:
          LTS: ${{ github.ref_name }}
        # The chart's values.yaml.template carries example version values
        # that customers reference when filling in their own values.yaml.
        # The orchestrator doesn't touch these (they're free-form `key:
        # value` lines, not structured TOML/YAML version fields), so we
        # do a simple sed pass here BEFORE helm package so the packaged
        # chart's example references the LTS version.
        # Mirrors the bump-arthur-engine-version sed pattern.
        run: |
          set -e
          GENAI_VALUES="deployment/helm/genai-engine/values.yaml.template"
          ML_VALUES="deployment/helm/ml-engine/values.yaml.template"
          if [ -f "$GENAI_VALUES" ]; then
            sed -i "s|genaiEngineVersion:.*|genaiEngineVersion: '${LTS}'|" "$GENAI_VALUES"
          fi
          if [ -f "$ML_VALUES" ]; then
            sed -i "s|containerImageVersion:.*|containerImageVersion: \"${LTS}\"|" "$ML_VALUES"
          fi
      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            -u "${{ github.actor }}" --password-stdin
      - name: Log in to Docker Hub OCI
        run: |
          echo "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" | helm registry login registry-1.docker.io \
            -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin
      - name: Package and push charts
        env:
          LTS: ${{ github.ref_name }}
        run: |
          set -e
          for SUBDIR in genai-engine ml-engine; do
            echo "==== arthur-${SUBDIR} chart ===="
            helm package "deployment/helm/${SUBDIR}"
            TGZ="arthur-${SUBDIR}-${LTS}.tgz"
            if [ ! -f "$TGZ" ]; then
              echo "ERROR: expected $TGZ from helm package, not found." >&2
              ls -la "arthur-${SUBDIR}"-*.tgz 2>/dev/null || true
              exit 1
            fi
            helm push "$TGZ" "oci://ghcr.io/${{ github.repository }}/charts"
            helm push "$TGZ" "oci://registry-1.docker.io/arthurplatform"
            rm -f "$TGZ"
          done

  # ── 3. arthur-observability-sdk PyPI publish ────────────────────────────
  generate-observability-client:
    name: Generate observability SDK client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Generate API client
        working-directory: arthur-observability-sdk
        run: ./scripts/generate_openapi_client.sh generate python
      - uses: actions/upload-artifact@v4
        with:
          name: arthur-genai-client-lts
          path: arthur-observability-sdk/python/src/arthur_genai_client

  build-observability-wheel:
    name: Build observability SDK wheel
    needs: generate-observability-client
    runs-on: ubuntu-latest
    container: python:3.12-bullseye
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: ./.github/workflows/composite-actions/setup-git
        with:
          safe-directory: ${{ runner.workspace }}
      - uses: actions/download-artifact@v4
        with:
          name: arthur-genai-client-lts
          path: arthur-observability-sdk/python/src/arthur_genai_client
      # Install uv directly (NOT the local `setup-uv` composite, which runs
      # `uv sync --frozen` — and that would fail because the lts-management
      # orchestrator changed pyproject.toml version, putting it out of sync
      # with uv.lock). `uv build` (used inside build_sdk_wheel.sh) doesn't
      # need a synced environment.
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.7"
      - name: Verify pyproject is at .post form
        run: |
          PYPI_VER=$(python3 -c "import tomllib; d=tomllib.load(open('arthur-observability-sdk/python/pyproject.toml','rb')); print(d['project']['version'])")
          echo "Wheel version will be: ${PYPI_VER}"
          case "$PYPI_VER" in
            *.post*) ;;
            *)
              echo "ERROR: arthur-observability-sdk pyproject is at '$PYPI_VER' but expected a .postN form." >&2
              echo "       The lts-management orchestrator should have written the .post form via SetProjectVersion." >&2
              exit 1
              ;;
          esac
      - name: Build wheel
        run: ./arthur-observability-sdk/scripts/build_sdk_wheel.sh
      - uses: actions/upload-artifact@v4
        with:
          name: sdk-wheel-lts
          path: arthur-observability-sdk/dist/*.whl

  publish-observability-pypi:
    name: Publish observability SDK to PyPI
    needs: build-observability-wheel
    runs-on: ubuntu-latest
    environment:
      name: shared-protected-branch-secrets
      url: https://pypi.org/project/arthur-observability-sdk/
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdk-wheel-lts
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
