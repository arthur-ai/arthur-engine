name: Arthur Engine — LTS Release

# LTS publish pipeline. Independent from `arthur-engine-workflow.yml`
# (the continuous build/publish) and `version-workflow.yml` (the
# continuous version bump).
#
# Strategy:
#   * genai-engine-cpu/gpu + ml-engine: BUILD from source. These depend
#     on arthur-common (pinned in pyproject.toml by the orchestrator), so
#     the LTS branch must be compiled fresh — retagging the source images
#     would bake the pre-LTS arthur-common version.
#   * genai-engine-models, genai-engine-models-k8s, arthur-model-upload:
#     BUILD from source. Each Dockerfile downloads models from HuggingFace
#     at build time; building from the LTS branch ensures a clean,
#     self-contained LTS image rather than retagging a source image that
#     may not exist for every patch.
#   * Helm charts: REPACKAGE (Chart.yaml has been updated to LTS by the
#     orchestrator). Push to Docker Hub OCI only.
#
# Trigger: tag matching `*-lts` or `*-lts-patch-*` (simple human-readable
# globs). No commit-message gates, no branch gates. The continuous
# workflows above ARE NOT modified — they don't fire on `lts/*` branches
# or on these tags because their existing triggers don't match.

on:
  push:
    tags:
      - '*-lts'
      - '*-lts-patch-*'

jobs:
  # ── 1. Build genai-engine (cpu + gpu) from source ────────────────────────
  build-genai-engine:
    name: Build genai-engine-${{ matrix.torch_device }}
    runs-on: ubuntu-latest
    environment: shared-protected-branch-secrets
    strategy:
      matrix:
        torch_device: [cpu, gpu]
    steps:
      - uses: mathio/gha-cleanup@v1
        with:
          remove-browsers: true
          verbose: true
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - name: Set up QEMU
        if: matrix.torch_device == 'cpu'
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.11.1
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      - name: Build and push genai-engine-${{ matrix.torch_device }}
        uses: docker/build-push-action@v6.18.0
        with:
          context: "{{defaultContext}}:genai-engine"
          file: dockerfile
          build-args: |
            TORCH_DEVICE=${{ matrix.torch_device }}
            ENABLE_TELEMETRY=false
            GITLAB_UNIFY_FRONTEND_TOKEN=${{ secrets.GITLAB_UNIFY_FRONTEND_TOKEN }}
          tags: arthurplatform/genai-engine-${{ matrix.torch_device }}:${{ github.ref_name }}
          push: true
          platforms: ${{ matrix.torch_device == 'cpu' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}

  # ── 2. Build ml-engine from source ───────────────────────────────────────
  build-ml-engine:
    name: Build ml-engine
    runs-on: ubuntu-latest
    environment: shared-protected-branch-secrets
    steps:
      - uses: mathio/gha-cleanup@v1
        with:
          remove-browsers: true
          verbose: true
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - name: Generate GenAI Client
        run: |
          pip install 'openapi-generator-cli[jdk4py]==7.12'
          openapi-generator-cli generate -c ml-engine/scripts/openapitools.json
          sed -i 's/license = "NoLicense"/license = "Unlicense"/g' ./ml-engine/src/genai_client/pyproject.toml
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      - name: Build and push ml-engine
        run: |
          cd ml-engine
          docker build -t arthurplatform/ml-engine:${{ github.ref_name }} .
          docker push arthurplatform/ml-engine:${{ github.ref_name }}

  # ── 3. Build model-upload images from source ─────────────────────────────
  build-models-images:
    name: Build model-upload images
    runs-on: ubuntu-latest
    environment: shared-protected-branch-secrets
    steps:
      - uses: mathio/gha-cleanup@v1
        with:
          remove-browsers: true
          verbose: true
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.11.1
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      - name: Build and push genai-engine-models (ECS)
        uses: docker/build-push-action@v6.18.0
        with:
          context: "{{defaultContext}}:deployment/ecs/model-upload"
          file: Dockerfile
          tags: arthurplatform/genai-engine-models:${{ github.ref_name }}
          push: true
          platforms: linux/amd64
      - name: Build and push genai-engine-models-k8s
        uses: docker/build-push-action@v6.18.0
        with:
          context: "{{defaultContext}}:deployment/k8s/model-upload-oc"
          file: Dockerfile
          tags: arthurplatform/genai-engine-models-k8s:${{ github.ref_name }}
          push: true
          platforms: linux/amd64
      - name: Build and push arthur-model-upload (GCP)
        uses: docker/build-push-action@v6.18.0
        with:
          context: "{{defaultContext}}:deployment/gcp/model-upload"
          file: Dockerfile
          tags: arthurplatform/arthur-model-upload:${{ github.ref_name }}-gcp
          push: true
          platforms: linux/amd64

  # ── 4. Package + push Helm charts (genai-engine, ml-engine) ─────────────
  publish-helm-charts:
    name: Publish helm charts
    runs-on: ubuntu-latest
    environment: shared-protected-branch-secrets
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: ./.github/workflows/composite-actions/setup-helm
      - name: Verify Chart.yaml versions match the LTS tag
        env:
          LTS: ${{ github.ref_name }}
        run: |
          set -e
          for CHART in deployment/helm/genai-engine/Chart.yaml deployment/helm/ml-engine/Chart.yaml; do
            CHART_VER=$(awk '/^version:/ {print $2; exit}' "$CHART")
            if [ "$CHART_VER" != "$LTS" ]; then
              echo "ERROR: $CHART has version=$CHART_VER, expected $LTS." >&2
              echo "       The lts-management orchestrator must bump Chart.yaml" >&2
              echo "       to the LTS form before pushing the tag." >&2
              exit 1
            fi
          done
      - name: Bump version refs in values.yaml.template (template docs only)
        env:
          LTS: ${{ github.ref_name }}
        # The chart's values.yaml.template carries example version values
        # that customers reference when filling in their own values.yaml.
        # The orchestrator doesn't touch these (they're free-form `key:
        # value` lines, not structured TOML/YAML version fields), so we
        # do a simple sed pass here BEFORE helm package so the packaged
        # chart's example references the LTS version.
        # Mirrors the bump-arthur-engine-version sed pattern.
        run: |
          set -e
          GENAI_VALUES="deployment/helm/genai-engine/values.yaml.template"
          ML_VALUES="deployment/helm/ml-engine/values.yaml.template"
          if [ -f "$GENAI_VALUES" ]; then
            sed -i "s|genaiEngineVersion:.*|genaiEngineVersion: '${LTS}'|" "$GENAI_VALUES"
          fi
          if [ -f "$ML_VALUES" ]; then
            sed -i "s|containerImageVersion:.*|containerImageVersion: \"${LTS}\"|" "$ML_VALUES"
          fi
      - name: Log in to Docker Hub OCI
        run: |
          echo "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" | helm registry login registry-1.docker.io \
            -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin
      - name: Package and push charts
        env:
          LTS: ${{ github.ref_name }}
        run: |
          set -e
          for SUBDIR in genai-engine ml-engine; do
            echo "==== arthur-${SUBDIR} chart ===="
            helm package "deployment/helm/${SUBDIR}"
            TGZ="arthur-${SUBDIR}-${LTS}.tgz"
            if [ ! -f "$TGZ" ]; then
              echo "ERROR: expected $TGZ from helm package, not found." >&2
              ls -la "arthur-${SUBDIR}"-*.tgz 2>/dev/null || true
              exit 1
            fi
            helm push "$TGZ" "oci://registry-1.docker.io/arthurplatform"
            rm -f "$TGZ"
          done
