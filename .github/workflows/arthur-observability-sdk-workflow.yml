name: Arthur Observability SDK CI

on:
  pull_request:
    paths:
      - 'arthur-observability-sdk/**'
  workflow_dispatch:

jobs:
  run-linter:
    runs-on: ubuntu-latest
    container: python:3.12-bullseye
    env:
      GIT_DEPTH: 100
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: ${{ env.GIT_DEPTH }}
      - uses: ./.github/workflows/composite-actions/setup-git
        with:
          safe-directory: ${{ runner.workspace }}
      - uses: ./.github/workflows/composite-actions/setup-poetry
        with:
          working-directory: arthur-observability-sdk
          with-groups: dev
      - name: Run isort
        id: isort
        continue-on-error: true
        run: |
          poetry -C arthur-observability-sdk run isort src tests --profile black --check
      - name: Run autoflake
        id: autoflake
        continue-on-error: true
        run: |
          poetry -C arthur-observability-sdk run autoflake --remove-all-unused-imports --in-place --check --recursive --quiet src tests
      - name: Run black
        id: black
        continue-on-error: true
        run: |
          poetry -C arthur-observability-sdk run black --check src tests
      - name: Run mypy
        id: mypy
        continue-on-error: true
        run: |
          poetry -C arthur-observability-sdk run mypy src/arthur_observability_sdk
      - name: Check linter results
        if: steps.isort.outcome == 'failure' || steps.autoflake.outcome == 'failure' || steps.black.outcome == 'failure' || steps.mypy.outcome == 'failure'
        run: |
          echo "One or more linters failed:"
          echo "  isort:     ${{ steps.isort.outcome }}"
          echo "  autoflake: ${{ steps.autoflake.outcome }}"
          echo "  black:     ${{ steps.black.outcome }}"
          echo "  mypy:      ${{ steps.mypy.outcome }}"
          exit 1

  run-tests:
    runs-on: ubuntu-latest
    container: python:3.12-bullseye
    env:
      GIT_DEPTH: 100
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: ${{ env.GIT_DEPTH }}
      - uses: ./.github/workflows/composite-actions/setup-git
        with:
          safe-directory: ${{ runner.workspace }}
      - uses: ./.github/workflows/composite-actions/setup-poetry
        with:
          working-directory: arthur-observability-sdk
          with-groups: dev
      - name: Run tests
        run: |
          poetry -C arthur-observability-sdk run pytest tests -v

  check-new-instrumentors:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - name: Check for new OpenInference instrumentors on PyPI
        run: bash arthur-observability-sdk/scripts/check_new_instrumentors.sh

  claude-code-review:
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'renovate' && github.event.pull_request.user.login != 'renovate[bot]'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review --comment https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
