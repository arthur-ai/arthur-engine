# PersistentVolumeClaim for storing models
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: arthur-models-pvc
  labels:
    app: arthur-models
spec:
  accessModes:
    - ReadWriteOnce  # For single pod write, or ReadWriteMany for multiple pods
  resources:
    requests:
      storage: 10Gi  # Adjust based on your model sizes (~3-4GB models + overhead)
  # For OpenShift, you may want to specify storageClassName
  # storageClassName: gp3  # or your cluster's default storage class
