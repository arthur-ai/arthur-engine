{{- if .Values.modelsService.enabled }}
{{/*
Auto-generate the bearer token shared between genai-engine and
arthur-models-service. Mirrors the lookup-and-preserve pattern used for
genaiEngineSecretStoreKeyName in templates/secrets.yaml so upgrades don't
rotate the secret out from under a running engine.
*/}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace .Values.modelsService.secretName }}
{{- $value := "" }}
{{- if $existing }}
  {{- $value = index $existing.data "secret" }}
{{- else }}
  {{- $value = randAlphaNum 48 | b64enc }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.modelsService.secretName }}
  labels:
    app: arthur-models-service
    {{- include "arthur-genai-engine.labels" . | nindent 4 }}
type: Opaque
data:
  secret: {{ $value }}
{{- end }}
