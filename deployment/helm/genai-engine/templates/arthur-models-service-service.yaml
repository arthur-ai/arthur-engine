{{- if .Values.modelsService.enabled }}
apiVersion: v1
kind: Service
metadata:
  {{- if .Values.arthurResourceNameSuffix }}
  name: arthur-models-service-{{ .Values.arthurResourceNameSuffix }}
  {{- else }}
  name: arthur-models-service
  {{- end }}
  {{- with .Values.modelsService.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    app: arthur-models-service
    {{- include "arthur-genai-engine.labels" . | nindent 4 }}
    {{- with .Values.modelsService.service.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  type: ClusterIP
  ports:
    - port: 7600
      targetPort: 7600
  selector:
    app: arthur-models-service
{{- end }}
