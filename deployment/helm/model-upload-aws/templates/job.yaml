apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "arthur-model-upload.fullname" . }}{{ if or .Values.arthurResourceNameSuffix .Values.resourceNameSuffix }}-{{ .Values.arthurResourceNameSuffix | default .Values.resourceNameSuffix }}{{ end }}
  labels:
    {{- include "arthur-model-upload.labels" . | nindent 4 }}
  {{- with .Values.job.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.job.backoffLimit }}
  backoffLimit: {{ .Values.job.backoffLimit }}
  {{- end }}
  {{- if .Values.job.activeDeadlineSeconds }}
  activeDeadlineSeconds: {{ .Values.job.activeDeadlineSeconds }}
  {{- end }}
  {{- if .Values.job.ttlSecondsAfterFinished }}
  ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "arthur-model-upload.selectorLabels" . | nindent 8 }}
      {{- with .Values.job.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- else if and .Values.containerRepository .Values.containerRepository.credentialsRequired .Values.containerRepository.imagePullSecretName }}
      imagePullSecrets:
        - name: {{ .Values.containerRepository.imagePullSecretName }}
      {{- end }}
      serviceAccountName: {{ include "arthur-model-upload.serviceAccountName" . }}
      restartPolicy: {{ .Values.job.restartPolicy }}
      {{- if .Values.job.priorityClassName }}
      priorityClassName: {{ .Values.job.priorityClassName }}
      {{- end }}
      {{- if .Values.securityContext }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      {{- end }}
      containers:
      - name: model-upload
        {{- $imageRepo := .Values.image.repository | default (printf "%s/%s" (.Values.containerRepository.imageLocation | default "arthurplatform") (.Values.containerRepository.imageName | default "genai-engine-models")) }}
        {{- $imageTag := .Values.image.tag | default (.Values.containerRepository.imageVersion | default .Chart.AppVersion) }}
        image: "{{ $imageRepo }}:{{ $imageTag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
        {{- if .Values.containerSecurityContext }}
        securityContext:
          {{- toYaml .Values.containerSecurityContext | nindent 10 }}
        {{- end }}
        env:
        - name: STORAGE_BACKEND
          value: "s3"
        - name: LOG_LEVEL
          value: {{ .Values.logLevel | default "INFO" | quote }}
        - name: MODELS_DIR
          value: {{ .Values.modelsDir | default "/models" | quote }}
        - name: S3_BUCKET
          value: {{ .Values.s3.bucket | default .Values.s3Bucket | quote }}
        - name: S3_PREFIX
          value: {{ .Values.s3.prefix | default .Values.s3Prefix | default "" | quote }}
        {{- if or .Values.serviceAccount.awsIrsaRoleArn .Values.serviceAccountAWSIrsaRoleArn }}
        {{- else if .Values.awsCredentials.create }}
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "arthur-model-upload.fullname" . }}{{ if or .Values.arthurResourceNameSuffix .Values.resourceNameSuffix }}-{{ .Values.arthurResourceNameSuffix | default .Values.resourceNameSuffix }}{{ end }}-aws-credentials
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "arthur-model-upload.fullname" . }}{{ if or .Values.arthurResourceNameSuffix .Values.resourceNameSuffix }}-{{ .Values.arthurResourceNameSuffix | default .Values.resourceNameSuffix }}{{ end }}-aws-credentials
              key: AWS_SECRET_ACCESS_KEY
        {{- if .Values.awsCredentials.region }}
        - name: AWS_REGION
          valueFrom:
            secretKeyRef:
              name: {{ include "arthur-model-upload.fullname" . }}{{ if or .Values.arthurResourceNameSuffix .Values.resourceNameSuffix }}-{{ .Values.arthurResourceNameSuffix | default .Values.resourceNameSuffix }}{{ end }}-aws-credentials
              key: AWS_REGION
        {{- end }}
        {{- else }}
        {{- if .Values.awsCredentials.region }}
        - name: AWS_REGION
          value: {{ .Values.awsCredentials.region | quote }}
        {{- end }}
        {{- end }}
        {{- with .Values.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
