{{- if .Values.openshift.securityContextConstraints.enabled }}
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: {{ include "arthur-model-upload.fullname" . }}{{ if or .Values.arthurResourceNameSuffix .Values.resourceNameSuffix }}-{{ .Values.arthurResourceNameSuffix | default .Values.resourceNameSuffix }}{{ end }}-scc
  labels:
    {{- include "arthur-model-upload.labels" . | nindent 4 }}
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: false
allowPrivilegedContainer: false
allowedCapabilities: []
allowedFlexVolumes: []
allowedUnsafeSysctls: []
defaultAddCapabilities: []
forbiddenSysctls: []
fsGroup:
  type: RunAsAny
readOnlyRootFilesystem: false
requiredDropCapabilities:
  - ALL
runAsUser:
  type: MustRunAs
  uid: {{ .Values.openshift.securityContextConstraints.runAsUser | default 65532 }}
seLinuxContext:
  type: MustRunAs
supplementalGroups:
  type: RunAsAny
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - persistentVolumeClaim
  - projected
  - secret
users:
  - system:serviceaccount:{{ .Release.Namespace }}:{{ include "arthur-model-upload.serviceAccountName" . }}
{{- end }}
