{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "arthur-model-upload.serviceAccountName" . }}{{ if or .Values.arthurResourceNameSuffix .Values.resourceNameSuffix }}-{{ .Values.arthurResourceNameSuffix | default .Values.resourceNameSuffix }}{{ end }}
  labels:
    {{- include "arthur-model-upload.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.serviceAccount.annotations }}
    {{- toYaml .Values.serviceAccount.annotations | nindent 4 }}
    {{- end }}
    {{- if .Values.serviceAccountAWSIrsaRoleArn }}
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccountAWSIrsaRoleArn | quote }}
    {{- end }}
{{- end }}
