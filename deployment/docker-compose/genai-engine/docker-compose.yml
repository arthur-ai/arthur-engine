name: arthur-genai-engine
services:
  db:
    image: postgres:15
    shm_size: 128mb
    environment:
      - POSTGRES_PASSWORD=changeme_pg_password
      - POSTGRES_DB=arthur_genai_engine
    volumes:
      - db_data:/var/lib/postgresql/data
    env_file:
      - .env
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d arthur_genai_engine"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
  models-service:
    # Sideloaded torch/transformers inference. Hosts prompt-injection,
    # toxicity, PII (v1/v2) and hallucination claim-filter models. Genai-engine
    # talks to it over HTTP, gated by MODEL_REGISTRY_SECRET.
    # If you have GPUs, use `arthur-models-service-gpu` image instead.
    image: arthurplatform/arthur-models-service-cpu:${MODELS_SERVICE_VERSION-latest}
    environment:
      - MODELS_SERVICE_PORT=7600
      - MODELS_SERVICE_HOST=0.0.0.0
      - MODEL_STORAGE_PATH=/models
    env_file:
      - .env
    volumes:
      # Persists ~1.5 GB of HF weights across container restarts; first boot
      # downloads them, subsequent starts skip the network round-trip.
      - models_cache:/models
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7600/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
  genai-engine:
    # If you have GPUs, use `genai-engine-gpu` image instead
    image: arthurplatform/genai-engine-cpu:${GENAI_ENGINE_VERSION-latest}
    depends_on:
      db:
        condition: service_healthy
      models-service:
        condition: service_healthy
    ports:
      - "3030:3030"
    environment:
      - POSTGRES_USER=postgres
      # Must match POSTGRES_PASSWORD in the db service
      - POSTGRES_PASSWORD=changeme_pg_password
      - POSTGRES_URL=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=arthur_genai_engine
      - POSTGRES_USE_SSL=false
      - ALLOW_ADMIN_KEY_GENERAL_ACCESS=enabled
      # The address you want to access the engine from (e.g. hostname, DNS)
      - GENAI_ENGINE_INGRESS_URI=http://localhost:3030
      - GENAI_ENGINE_ADMIN_KEY=changeme_genai_engine_admin_key
      # Sideloaded models-service: scorer torch/transformers inference lives here.
      - MODELS_SERVICE_URL=http://models-service:7600
      # Key used for encrypting secrets, generate a random string if not using
      # the setup-and-start scripts to populate one in the .env file
      # openssl rand -base64 32
      # - GENAI_ENGINE_SECRET_STORE_KEY=changeme_secret_store_key
      # MODEL_REGISTRY_SECRET also comes from .env — must match the value the
      # models-service container loads.
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "lsof", "-i", ":3030"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 300s
volumes:
  db_data:
  models_cache:
