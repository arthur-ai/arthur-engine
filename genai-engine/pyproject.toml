  "python-multipart==0.0.32",
  "pypdf==6.13.3",
  "httpx==0.28.1",
  "transformers==5.0.0",
  "authlib==1.6.12",
  "requests==2.33.0",
  "starlette==1.3.1",
  "pyjwt==2.13.0",
  "azure-storage-blob==12.27.1",
  "itsdangerous==2.2.0",
  "newrelic==10.17.0",
  "importlib-metadata==8.5.0",
  "opentelemetry-instrumentation-logging>=0.60b1,<0.61",
  "opentelemetry-instrumentation>=0.60b1,<0.61",
  "opentelemetry-instrumentation-fastapi>=0.60b1,<0.61",
  "opentelemetry-exporter-otlp>=1.39.1,<2",
  "opentelemetry-instrumentation-sqlalchemy>=0.60b1,<0.61",
  "tiktoken==0.12.0",
  "nltk==3.9.4",
  "more-itertools==10.8.0",
  "presidio-analyzer==2.2.362",
  "presidio-anonymizer==2.2.362",
  "python-keycloak==5.8.1",
  "bcrypt==4.3.0",
  "cachetools==6.2.6",
  "sentence-transformers==5.6.0",
  "en-core-web-lg @ https://github.com/explosion/spacy-models/releases/download/en_core_web_lg-3.8.0/en_core_web_lg-3.8.0-py3-none-any.whl",
  "torch==2.9.1 ; sys_platform == 'darwin'",
  "torch==2.9.1+cpu ; sys_platform == 'linux' or sys_platform == 'win32'",
