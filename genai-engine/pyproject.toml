[project.scripts]
serve = "src.server:start"
generate_changelog = "changelog:main"
routes_security_check = "routes_security_check:main"

[dependency-groups]
dev = [
  "pytest==8.4.2",
  "pytest-asyncio==1.2.0",
  "pytest-cov==6.3.0",
  "pre-commit==4.5.1",
  "types-cachetools>=6.2.0.20251022",
]
performance = [
  "locust==2.43.3",
]
linters = [
  "black==26.3.1",
  "mypy>=1.13.0,<2",
  "isort>=7.0.0",
  "autoflake>=2.3.1,<3",
]

[tool.uv]
exclude-newer = "3 days"
exclude-newer-package = { torch = false, arthur-common = false, arthur-client = false }
# Security: pin transitive hf-xet (its wheel vendors Rust crates) to >=1.5.1, which bundles
# rustls-webpki 0.103.13 — fixing RUSTSEC-2026-0104 (HIGH: DoS panic in CRL parsing).
# Accepted exception: hf-xet 1.5.1 still vendors quinn-proto 0.11.14 (RUSTSEC-2026-0185, HIGH:
# remote memory exhaustion). No hf-xet release fixes it as of 2026-06-25 (xet-core main also pins
# 0.11.14). Low risk here — hf-xet's QUIC is a client to HuggingFace's TLS-authenticated CAS
# servers and the DoS needs a malicious QUIC peer. Re-bump hf-xet once upstream lands the fix.
constraint-dependencies = ["hf-xet>=1.5.1"]

[[tool.uv.index]]
name = "PyPI"
url = "https://pypi.org/simple"
priority = "primary"

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[[tool.uv.index]]
name = "arthur-repo"
url = "https://gitlab.com/api/v4/projects/45576036/packages/pypi"
explicit = true

[tool.uv.sources]
torch = [
  { index = "pytorch-cpu", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
implicit_reexport = true
explicit_package_bases = true
mypy_path = "src"
namespace_packages = true
disable_error_code = ["untyped-decorator"]

[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-vv"
pythonpath = ["src"]
testpaths = [
    "tests"
]
asyncio_default_fixture_loop_scope = "function"
markers = [
    "api_key_tests: mark a test as testing api key actions",
    "aws_live: mark a test as running against a live environment. AWS_BUCKET_NAME must be supplied as an environment variable",
    "azure_live: mark a test as running against a live environment. AZURE_STORAGE_CONTAINER_NAME and AZURE_STORAGE_CONNECTION_STRING must be supplied as a environment variables",
    "integration_tests: mark a test as running an integration test. These will tend to replicate user flows and minimize the amount of junk data created",
    "unit_tests: mark a test as part of the unit tests suite. These should run locally with no outside configuration required. Should also be entirely self contained (no external dependencies)",
    "skip_auto_api_key_create: mark a test as opting out of api key creation and deletion pre and post steps"
]

[tool.black]
target-version = ['py312']

[tool.isort]
profile = "black"
